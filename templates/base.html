<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frontend</title>
    <!--    Link do Boostrap - Antes do CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--    Link do Bootstrap icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/style.css">

    <!--Link do Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
<div class="menu">
    <ul>
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li><a href="{{ url_for('calculos')}}">Cálculos</a></li>
        <li><a href="{{ url_for('funcionarios') }}">Funcionários</a></li>
        <li><a href="{{ url_for('animais') }}">Animais</a></li>
        <li><a href="{{ url_for('listar_gatos') }}">Gatos</a></li>

        {% if current_user.is_authenticated %}
        <a type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalLogout">{{current_user.nome}}</a>
        {% else %}
        <li><a href="{{ url_for('login') }}">Login</a></li>
        {% endif %}

        <!-- Modal -->
        <div class="modal fade" id="modalLogout" tabindex="-1" aria-labelledby="mostrar1"
             aria-hidden="true">
            <form action="{{ url_for('cadastro_funcionario') }}" method="post">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="mostrar1">Deseja sair?</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                        </div>
                        <div class="modal-footer">
                            <a class="btn btn-danger" href="{{ url_for('logout') }}">Sair</a>
                            <button href="{{ url_for('home') }}" type="button" class="btn btn-secondary"
                                    data-bs-dismiss="modal">Fechar
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>

    </ul>
</div>
<div class="conteudo">
    {% block conteudo %}

    {% endblock %}
</div>
<!-- Link do JavaScript para o Bootstrap - Final do body -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

<script src="/static/js/verificacoes.js"></script>
<script src="/static/js/apis.js"></script>
</body>
</html>
